server {
    # Escucha en el puerto 80 (HTTP)
    listen 80;
    
    # Define el directorio público de Laravel como la raíz del servidor
    root /var/www/html/public;
    index index.php index.html index.htm;
    
    # Nombre del servidor (puede ser localhost o tu dominio)
    server_name localhost;

    # Bloque principal: Manejo de URLs limpias de Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Bloque PHP: Pasa las peticiones al contenedor de Laravel (PHP-FPM)
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        
        # Aquí "api-app" debe coincidir con el nombre de tu servicio en docker-compose
        # El puerto 9000 es el puerto por defecto de PHP-FPM
        fastcgi_pass api-app:9000; 
        
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Bloque de seguridad: Deniega el acceso a archivos ocultos (como .env)
    location ~ /\.ht {
        deny all;
    }
}
