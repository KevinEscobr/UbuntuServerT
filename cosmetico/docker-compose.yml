services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: Cosmetics_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db
    networks:
      - default
  web:
    image: nginx:1.27-alpine
    container_name: Cosmetics_web
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - default
      - red_global
  db:
    image: mysql:8.0
    container_name: Cosmetics_db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: Cosmetics #nombre de la base de datos
      MYSQL_USER: Cosmetics_user
      MYSQL_PASSWORD: Cosmetics_pass
    ports:
      - "3308:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - default
volumes:
  dbdata:

networks:
  default:
  red_global:
    external: true
