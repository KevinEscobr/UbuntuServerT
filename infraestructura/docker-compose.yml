version: '3.8'

services:
  # 1. El Túnel de Cloudflare (Conecta tu PC a Internet)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare_tunnel
    command: tunnel run
    environment:
      # Pega aquí el token súper largo que te dio Cloudflare en el menú Zero Trust
      - TUNNEL_TOKEN=eyJhIjoiZjIzZmM5ODI5MTRkY2U3YTU2YjVlNWMzNjM5MTczMzEiLCJ0IjoiMjZhZjE1ZTgtZTQ0Ni00ZmRlLTg3MjMtOThkNjNhMTNhMjJkIiwicyI6Ik56UXhZakUwWmpndE56STNNaTAwTmpWakxXSm1aR0l0WlRsbU5XWTBPRE14T0dNMiJ9
    restart: unless-stopped
    networks:
      - red_global

  # 2. El Proxy Inverso (El "Recepcionista" General)
  nginx_proxy:
    image: nginx:alpine
    container_name: nginx_global
    restart: unless-stopped
    ports:
      - "80:80" # ¡El único puerto 80 expuesto en todo tu servidor!
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - red_global

# Declaramos la red para que Nginx pueda hablar con tus otros proyectos
networks:
  red_global:
    external: true
