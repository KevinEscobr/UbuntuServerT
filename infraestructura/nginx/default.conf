# =======================================================
# 1. ESTE ES TU PROYECTO ACTUAL (api.nennge.me)
# =======================================================
server {
    listen 80;
    server_name api.nennge.me;

    location / {
        proxy_pass http://nginx_server:80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# =======================================================
# 2. ESTE ES EL NUEVO PROYECTO DE COSMÉTICOS (cosmeticos)
# =======================================================
server {
    listen 80;
    server_name cosmeticos.nennge.me; # Tu subdominio para la tienda de cosméticos

    location / {
        # Apunta al nombre del contenedor Nginx de este nuevo proyecto
        proxy_pass http://Cosmetics_web:80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

